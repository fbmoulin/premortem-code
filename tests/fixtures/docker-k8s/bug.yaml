# Deployment for the api service. [EVAL FIXTURE: contains a planted bug]
# Load-bearing default: the mutable `latest` tag means a later, unrelated rollout
# silently re-pulls a different image; no probe/limits compound the blast radius.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: registry.example.com/api:latest
