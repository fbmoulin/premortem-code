version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (security + feature flags).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
  # CI installs requirements-dev.txt every run; keep it current too.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
