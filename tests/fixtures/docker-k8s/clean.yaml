# Deployment for the api service. [EVAL FIXTURE: correct]
# Image pinned by digest (immutable); readiness probe and resource limits set so
# the rollout behaviour does not ride on cluster defaults.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: api
          image: registry.example.com/api@sha256:3f1d8c0a9b2e4d6f8a1c2b3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f6071
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: 250m
